name: academia-lab

services:
  postgres:
    image: postgres:16-alpine
    container_name: academia-lab-postgres
    environment:
      POSTGRES_DB: monster_fitness
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zipkin:
    image: openzipkin/zipkin:3.6.1
    container_name: academia-lab-zipkin
    ports:
      - "9411:9411"

  api:
    build: .
    container_name: academia-lab-api
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/monster_fitness
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - postgres

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: academia-lab-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api

  grafana:
    image: grafana/grafana:13.0.2
    container_name: academia-lab-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
